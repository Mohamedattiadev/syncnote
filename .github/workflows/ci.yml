name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-test:
    name: CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Get CLI deps
        working-directory: cli
        run: dart pub get
      - name: Analyze CLI
        working-directory: cli
        run: dart analyze --fatal-infos
      - name: Test CLI
        working-directory: cli
        run: dart test

  cli-build:
    name: Build CLI binaries
    needs: cli-test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Get deps
        working-directory: cli
        run: dart pub get
      - name: Compile
        working-directory: cli
        shell: bash
        run: |
          mkdir -p ../bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            dart compile exe bin/syncnote.dart -o ../bin/syncnote-${{ matrix.os }}.exe
          else
            dart compile exe bin/syncnote.dart -o ../bin/syncnote-${{ matrix.os }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: syncnote-${{ matrix.os }}
          path: bin/syncnote-*

  flutter-check:
    name: Flutter analyze + build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Get deps
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Build web
        run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: syncnote-web
          path: build/web
