<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Doom One base bg -->
  <rect width="512" height="512" rx="112" fill="#282c34"/>
  <!-- Star (accent magenta) -->
  <g transform="translate(256 256)">
    <path d="M0 -140 L20 -20 L140 0 L20 20 L0 140 L-20 20 L-140 0 L-20 -20 Z"
          fill="#c678dd" opacity="0.15"/>
  </g>
  <!-- Note stack (primary blue) -->
  <g transform="translate(140 140)">
    <rect x="20" y="20" width="200" height="240" rx="24"
          fill="none" stroke="#51afef" stroke-width="12" opacity="0.35"/>
    <rect x="0" y="0" width="200" height="240" rx="24"
          fill="#21242b" stroke="#51afef" stroke-width="12"/>
    <!-- Lines representing text -->
    <rect x="32" y="60"  width="120" height="14" rx="4" fill="#bbc2cf"/>
    <rect x="32" y="96"  width="140" height="10" rx="4" fill="#5b6268"/>
    <rect x="32" y="122" width="110" height="10" rx="4" fill="#5b6268"/>
    <rect x="32" y="148" width="130" height="10" rx="4" fill="#5b6268"/>
    <!-- Task checkbox (success) -->
    <rect x="32" y="180" width="20" height="20" rx="4"
          fill="none" stroke="#98be65" stroke-width="4"/>
    <path d="M38 190 l6 6 l12 -12" stroke="#98be65"
          stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="60" y="182" width="90" height="10" rx="4" fill="#98be65"/>
  </g>
</svg>
