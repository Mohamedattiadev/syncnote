<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Radial gradient for depth -->
    <radialGradient id="bg" cx="30%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#3f444a"/>
      <stop offset="100%" stop-color="#21242b"/>
    </radialGradient>

    <!-- Gradient for the sync arc -->
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c678dd"/>
      <stop offset="100%" stop-color="#51afef"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#bbc2cf" stroke-width="1">
    <line x1="0"   y1="128" x2="512" y2="128"/>
    <line x1="0"   y1="256" x2="512" y2="256"/>
    <line x1="0"   y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0"   x2="128" y2="512"/>
    <line x1="256" y1="0"   x2="256" y2="512"/>
    <line x1="384" y1="0"   x2="384" y2="512"/>
  </g>

  <!-- Central mark: intertwined S+N with sync loop -->
  <g transform="translate(256 256)" filter="url(#glow)">
    <!-- Circular sync-loop backdrop -->
    <circle r="130" fill="none" stroke="url(#arc)" stroke-width="14"
            stroke-dasharray="620 200" stroke-linecap="round"
            transform="rotate(-30)"/>

    <!-- The "S" - simplified geometric mark -->
    <path d="M -60 -60
             Q -60 -90 -30 -90
             L 40 -90
             Q 70 -90 70 -60
             Q 70 -30 40 -30
             L -30 -30
             Q -60 -30 -60 0
             Q -60 30 -30 30
             L 40 30
             Q 70 30 70 60
             Q 70 90 40 90
             L -30 90
             Q -60 90 -60 60"
          fill="none"
          stroke="#bbc2cf"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Two dots representing sync (device to device) -->
    <circle cx="-110" cy="-70" r="10" fill="#c678dd"/>
    <circle cx="110"  cy="70"  r="10" fill="#51afef"/>
  </g>
</svg>
