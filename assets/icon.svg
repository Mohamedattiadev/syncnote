<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f333c"/>
      <stop offset="1" stop-color="#1c1f26"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c678dd"/>
      <stop offset="1" stop-color="#51afef"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c678dd" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#c678dd" stop-opacity="0"/>
      <stop offset="1" stop-color="#51afef" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none"
        stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- sync ring: broken circle, gradient stroke, tilted -->
  <g transform="translate(256 256) rotate(-45)">
    <circle r="168" fill="none" stroke="url(#ring)" stroke-width="14"
            stroke-linecap="round" stroke-dasharray="820 250"/>
  </g>
  <!-- arrow caps aligned to gap -->
  <g transform="translate(256 256) rotate(-45)">
    <polygon points="168,-22 196,0 168,22" fill="#51afef"/>
    <polygon points="-168,22 -196,0 -168,-22" fill="#c678dd"/>
  </g>

  <!-- S monogram: flowing stroke -->
  <g transform="translate(256 256)" fill="none" stroke="url(#mark)"
     stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 62 -80
             A 72 60 0 0 0 -62 -40
             A 62 46 0 0 1  62  40
             A 72 60 0 0 0 -62  80"/>
  </g>

  <!-- accent dot -->
  <circle cx="378" cy="378" r="14" fill="#51afef"/>
</svg>
